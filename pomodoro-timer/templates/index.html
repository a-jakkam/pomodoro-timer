<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO // DRIFT</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bef264; --bg: #f8fafc; }
        * { font-family: 'Nunito', sans-serif; transition: all 0.2s ease; }
        body { background-color: var(--bg); color: #0f172a; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .locked { filter: grayscale(1) opacity(0.2); }
        .week-bar { width: 22px; background: var(--accent); border-radius: 4px 4px 0 0; }
        .shelf-line { background: #cbd5e1; height: 6px; border-radius: 3px; margin: 10px 0 30px 0; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-900 tracking-tighter uppercase">Zero // Drift</h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Status: Neural Link Active</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="glass-card px-6 py-4 text-center min-w-[140px]">
                    <p class="text-[10px] font-900 text-slate-400 uppercase tracking-widest">Efficiency</p>
                    <h2 id="focus-score" class="text-3xl font-900 text-slate-800">100%</h2>
                </div>
                <div class="glass-card px-6 py-4 text-center min-w-[100px]">
                    <p class="text-[10px] font-900 text-slate-400 uppercase tracking-widest">Cycles</p>
                    <h2 id="session-display" class="text-3xl font-900 text-slate-800">0</h2>
                </div>
                <button id="reset-btn" class="bg-red-600 hover:bg-red-700 text-white font-900 py-3 px-6 rounded-2xl text-[10px] uppercase shadow-lg shadow-red-100">
                    Reset<br>Cycles
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="glass-card p-8 lg:col-span-2">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xs font-900 uppercase tracking-widest text-slate-400">Performance Matrix</h2>
                    <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                        <input type="number" id="pause-input" placeholder="Pauses" class="w-16 bg-transparent text-center text-sm font-bold outline-none">
                        <button id="log-btn" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-900 uppercase">Commit</button>
                    </div>
                </div>
                <div id="chart-container" class="flex items-end justify-around h-32 border-b border-slate-100 pb-2"></div>
                <div class="flex justify-around mt-3 text-[10px] font-900 text-slate-300">
                    <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
                </div>
            </div>

            <div class="glass-card p-8 flex flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-lime-100 rounded-full flex items-center justify-center mb-4">
                    <i data-lucide="award" class="text-lime-600"></i>
                </div>
                <h3 class="font-900">System Synced</h3>
                <p class="text-[11px] text-slate-400 font-bold uppercase mt-2">Finish your cycle to log data</p>
            </div>
        </div>

        <div class="glass-card p-8 bg-slate-50/50">
            <h2 class="text-xs font-900 uppercase tracking-widest text-slate-400 mb-8">Hardware Archive</h2>
            <div id="trophy-shelf"></div>
        </div>
    </div>

    <script>
        const COLLECTIBLES = [
            { name: 'R-REX', svg: `<svg viewBox="0 0 80 50" width="50"><rect x="20" y="15" width="40" height="20" rx="4" fill="#fde68a"/><rect x="28" y="15" width="4" height="20" fill="#ef4444"/></svg>` },
            { name: 'C-CORE', svg: `<svg viewBox="0 0 80 60" width="50"><rect x="30" y="10" width="20" height="30" rx="4" fill="#38bdf8"/></svg>` },
            { name: 'L-UNIT', svg: `<svg viewBox="0 0 80 70" width="50"><path d="M25,45 L55,45 L55,30 A15,15 0 0,0 25,30 Z" fill="#bef264"/></svg>` },
            { name: 'CHIPPY', svg: `<svg viewBox="0 0 80 60" width="50"><rect x="20" y="10" width="40" height="40" rx="4" fill="#1e293b"/></svg>` }
        ];

        async function fetchState() {
            try {
                const res = await fetch('/update');
                const data = await res.json();
                
                // Update Cycles (Directly from Server)
                document.getElementById('session-display').innerText = data.sessions || 0;
                
                // NaN Killer: Fallback to 100 if data.efficiency is missing or undefined
                let eff = parseInt(data.efficiency);
                if (isNaN(eff)) { eff = 100; }
                document.getElementById('focus-score').innerText = eff + '%';
                
                // Chart
                const chart = document.getElementById('chart-container');
                chart.innerHTML = (data.weekData || []).map(val => `<div class="week-bar" style="height: ${val}%"></div>`).join('');

                renderTrophies(data.sessions || 0);
            } catch(e) { console.error("Link Lost"); }
        }

        function renderTrophies(count) {
            const shelf = document.getElementById('trophy-shelf');
            shelf.innerHTML = '';
            const row = document.createElement('div');
            row.className = 'flex justify-around mb-2';
            row.innerHTML = COLLECTIBLES.map((item, idx) => {
                const unlocked = count >= (idx + 1);
                return `<div class="text-center ${unlocked ? '' : 'locked'}">
                    <div class="bg-white p-5 rounded-3xl shadow-sm mb-2 border border-slate-100">${item.svg}</div>
                    <p class="text-[10px] font-900 uppercase tracking-tighter">${unlocked ? item.name : '???'}</p>
                </div>`;
            }).join('');
            shelf.appendChild(row);
            const line = document.createElement('div'); line.className = 'shelf-line';
            shelf.appendChild(line);
        }

        document.getElementById('log-btn').onclick = async () => {
            const val = document.getElementById('pause-input').value;
            await fetch('/log', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ pauses: val || 0 }) });
            document.getElementById('pause-input').value = '';
            fetchState();
        };

        document.getElementById('reset-btn').onclick = async () => {
            if(confirm("Reset all cycles and history?")) { 
                await fetch('/reset', { method: 'POST' }); 
                fetchState(); 
            }
        };

        setInterval(fetchState, 1000);
        fetchState();
        lucide.createIcons();
    </script>
</body>
</html>
