<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO // DRIFT</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --accent: #bef264; --bg: #f8fafc; }
    * { font-family: 'Nunito', sans-serif; transition: all 0.2s ease; }
    body { background-color: var(--bg); color: #0f172a; }
    .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .locked { filter: grayscale(1) opacity(0.2); }
    .week-bar { width: 22px; background: var(--accent); border-radius: 4px 4px 0 0; }
    .shelf-line { background: #cbd5e1; height: 6px; border-radius: 3px; margin: 10px 0 30px 0; }
    .card-inner { border-radius: 35% 65% 60% 40% / 45% 45% 55% 55%; padding: 1rem; display: flex; align-items: center; justify-content: center; background: white; border: 2px solid #fff; box-shadow: 0 8px 12px rgba(0,0,0,0.05); }
</style>
</head>
<body class="p-8">
<div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
        <div>
            <h1 class="text-3xl font-900 tracking-tighter uppercase">Zero // Drift</h1>
            <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Status: Neural Link Active</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="glass-card px-6 py-4 text-center min-w-[140px]">
                <p class="text-[10px] font-900 text-slate-400 uppercase tracking-widest">Efficiency</p>
                <h2 id="focus-score" class="text-3xl font-900 text-slate-800">100%</h2>
            </div>
            <div class="glass-card px-6 py-4 text-center min-w-[100px]">
                <p class="text-[10px] font-900 text-slate-400 uppercase tracking-widest">Cycles</p>
                <h2 id="session-display" class="text-3xl font-900 text-slate-800">0</h2>
            </div>
            <button id="reset-btn" class="bg-red-600 hover:bg-red-700 text-white font-900 py-3 px-6 rounded-2xl text-[10px] uppercase shadow-lg shadow-red-100">
                Reset<br>Cycles
            </button>
        </div>
    </div>

    <!-- Performance + System Sync -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
        <div class="glass-card p-8 lg:col-span-2">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xs font-900 uppercase tracking-widest text-slate-400">Performance Matrix</h2>
                <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                    <input type="number" id="pause-input" placeholder="Pauses" class="w-16 bg-transparent text-center text-sm font-bold outline-none">
                    <button id="log-btn" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-900 uppercase">Commit</button>
                </div>
            </div>
            <div id="chart-container" class="flex items-end justify-around h-32 border-b border-slate-100 pb-2"></div>
            <div class="flex justify-around mt-3 text-[10px] font-900 text-slate-300">
                <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
            </div>
        </div>
        <div class="glass-card p-8 flex flex-col items-center justify-center text-center">
            <div class="w-16 h-16 bg-lime-100 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="award" class="text-lime-600"></i>
            </div>
            <h3 class="font-900">System Synced</h3>
            <p class="text-[11px] text-slate-400 font-bold uppercase mt-2">Finish your cycle to log data</p>
        </div>
    </div>

    <!-- Hardware Archive -->
    <div class="glass-card p-8 bg-slate-50/50">
        <h2 class="text-xs font-900 uppercase tracking-widest text-slate-400 mb-8">Hardware Archive</h2>
        <div id="trophy-shelf"></div>
    </div>
</div>

<script>
// Collectibles / trophies
const COLLECTIBLES = [
    { name: 'R-REX', desc: 'Resistor', svg: `<svg viewBox="0 0 80 50" width="50"><rect x="20" y="15" width="40" height="20" rx="6" fill="#fde68a"/><rect x="28" y="15" width="4" height="20" fill="#ef4444"/><rect x="38" y="15" width="4" height="20" fill="#f59e0b"/><circle cx="35" cy="22" r="2.5" fill="#1e293b"/><circle cx="45" cy="22" r="2.5" fill="#1e293b"/><circle cx="33" cy="26" r="3" fill="#bef264" opacity="0.4"/><circle cx="47" cy="26" r="3" fill="#bef264" opacity="0.4"/><path d="M33,28 Q40,32 47,28" stroke="#1e293b" fill="none" stroke-width="1"/></svg>` },
    { name: 'C-CORE', desc: 'Capacitor', svg: `<svg viewBox="0 0 80 60" width="50"><rect x="30" y="10" width="20" height="30" rx="4" fill="#38bdf8"/><circle cx="36" cy="20" r="2.5" fill="#1e293b"/><circle cx="44" cy="20" r="2.5" fill="#1e293b"/><path d="M38,25 Q40,27 42,25" stroke="#1e293b" fill="none" stroke-width="1"/><circle cx="40" cy="35" r="3" fill="#bfdbfe"/></svg>` },
    { name: 'L-UNIT', desc: 'LED', svg: `<svg viewBox="0 0 80 70" width="50"><path d="M25,45 L55,45 L55,30 A15,15 0 0,0 25,30 Z" fill="#bef264"/><circle cx="34" cy="32" r="2.5" fill="#1e293b"/><circle cx="46" cy="32" r="2.5" fill="#1e293b"/><circle cx="40" cy="30" r="20" fill="#bef264" opacity="0.2"/><path d="M35,33 Q40,37 45,33" stroke="#1e293b" fill="none" stroke-width="1"/></svg>` },
    { name: 'T-LOGIC', desc: 'Transistor', svg: `<svg viewBox="0 0 80 70" width="50"><rect x="25" y="15" width="30" height="25" rx="3" fill="#1e293b"/><circle cx="35" cy="23" r="2" fill="white"/><circle cx="45" cy="23" r="2" fill="white"/><path d="M33,30 Q40,36 47,30" stroke="white" fill="none" stroke-width="1"/></svg>` },
    { name: 'I-FLUX', desc: 'Inductor', svg: `<svg viewBox="0 0 80 50" width="50"><path d="M15,30 Q22,10 29,30 Q36,10 43,30 Q50,10 57,30" fill="none" stroke="#d480ff" stroke-width="4"/><circle cx="33" cy="22" r="2.5" fill="#1e293b"/><circle cx="41" cy="22" r="2.5" fill="#1e293b"/><path d="M33,26 Q37,29 41,26" stroke="#1e293b" fill="none" stroke-width="1"/></svg>` },
    { name: 'D-GATE', desc: 'Diode', svg: `<svg viewBox="0 0 80 50" width="50"><polygon points="30,15 50,25 30,35" fill="#64748b"/><line x1="50" y1="15" x2="50" y2="35" stroke="#64748b" stroke-width="4"/><circle cx="34" cy="23" r="2.5" fill="white"/><circle cx="42" cy="23" r="2.5" fill="white"/><path d="M34,26 Q38,29 42,26" stroke="white" fill="none" stroke-width="1"/></svg>` },
    { name: 'CHIPPY', desc: 'IC Chip', svg: `<svg viewBox="0 0 80 60" width="50"><rect x="20" y="10" width="40" height="40" rx="4" fill="#1e293b"/><text x="40" y="44" text-anchor="middle" font-size="8" fill="#bef264" font-weight="bold" font-family="monospace">FPGA</text><circle cx="32" cy="22" r="2" fill="#facc15"/><circle cx="48" cy="22" r="2" fill="#facc15"/><path d="M32,26 Q40,32 48,26" stroke="#fde68a" fill="none" stroke-width="1"/></svg>` },
    { name: 'OZZY', desc: 'Oscillator', svg: `<svg viewBox="0 0 80 50" width="50"><rect x="15" y="10" width="50" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8"/><path d="M20,25 L30,15 L40,35 L50,15 L60,25" fill="none" stroke="#64748b" stroke-width="2"/><circle cx="30" cy="25" r="2" fill="#f43f5e"/><circle cx="50" cy="25" r="2" fill="#f43f5e"/></svg>` },
    { name: 'PETE', desc: 'PCB Board', svg: `<svg viewBox="0 0 80 60" width="50"><rect x="10" y="10" width="60" height="40" rx="6" fill="#334155"/><circle cx="35" cy="25" r="3" fill="#bef264"/><circle cx="45" cy="25" r="3" fill="#bef264"/><circle cx="30" cy="20" r="2" fill="#f43f5e"/><circle cx="50" cy="20" r="2" fill="#f43f5e"/></svg>` },
    { name: 'SYNC', desc: 'Crystal', svg: `<svg viewBox="0 0 80 60" width="50"><polygon points="40,5 60,20 60,40 40,55 20,40 20,20" fill="#ba68c8"/><text x="40" y="34" text-anchor="middle" font-size="7" fill="white" font-weight="bold">100M</text><circle cx="35" cy="30" r="2" fill="#fff"/><circle cx="45" cy="30" r="2" fill="#fff"/><path d="M35,33 Q40,37 45,33" stroke="white" fill="none" stroke-width="1"/></svg>` }
];

// Render trophies
function renderTrophies(count) {
    const shelf = document.getElementById('trophy-shelf');
    shelf.innerHTML = '';
    const container = document.createElement('div');
    container.className = 'flex flex-wrap justify-around gap-6';
    COLLECTIBLES.forEach((item, idx) => {
        const unlocked = count >= (idx + 1);
        const badge = document.createElement('div');
        badge.className = 'text-center ' + (unlocked ? '' : 'locked');
        badge.innerHTML = `
            <div class="card-inner mb-2">${item.svg}</div>
            <p class="text-[10px] font-900 uppercase tracking-tighter">${unlocked ? item.name : '???'}</p>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${unlocked ? item.desc : 'Locked'}</p>
        `;
        container.appendChild(badge);
    });
    shelf.appendChild(container);
    const line = document.createElement('div'); line.className = 'shelf-line';
    shelf.appendChild(line);
}

// Fetch live data from server
async function fetchState() {
    try {
        const res = await fetch('/update');
        const data = await res.json();
        const sessions = data.sessions || 0;
        const efficiency = isNaN(parseInt(data.efficiency)) ? 100 : parseInt(data.efficiency);

        document.getElementById('session-display').innerText = sessions;
        document.getElementById('focus-score').innerText = efficiency + '%';

        const chart = document.getElementById('chart-container');
        chart.innerHTML = (data.weekData || []).map(val => `<div class="week-bar" style="height:${val}%"></div>`).join('');

        renderTrophies(sessions);
        lucide.createIcons();
    } catch (e) {
        console.error("Failed to fetch state:", e);
    }
}

// Log pauses to server
document.getElementById('log-btn').onclick = async () => {
    const val = parseInt(document.getElementById('pause-input').value || 0);
    await fetch('/log', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ pauses: val })
    });
    document.getElementById('pause-input').value = '';
    fetchState();
};

// Reset cycles on server
document.getElementById('reset-btn').onclick = async () => {
    if(confirm("Reset all cycles?")) {
        await fetch('/reset', { method: 'POST' });
        fetchState();
    }
};

// Poll server every second
setInterval(fetchState, 1000);
fetchState();
</script>
</body>
</html>
